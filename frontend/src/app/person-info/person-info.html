<mat-card>
    <mat-card-actions align="end" class="px-4">
        <button matButton="filled" class="btn-primary" (click)="onPersonInfoModal(null)">ADD</button>
    </mat-card-actions>
    <mat-card-content>
        <table mat-table [dataSource]="personInfoList" class="mat-elevation-z2">
            <ng-container matColumnDef="Id">
                <th mat-header-cell *matHeaderCellDef class="text-center">Id</th>
                <td mat-cell *matCellDef="let item; let i = index" class="text-center">
                    {{ i + 1 }}
                </td>
            </ng-container>
            <ng-container matColumnDef="Name">
                <th mat-header-cell *matHeaderCellDef class="text-center">ชื่อ - สกุล</th>
                <td mat-cell *matCellDef="let item; let i = index" class="text-center">
                    {{ item.name }} {{ item.lastName }}
                </td>
            </ng-container>
            <ng-container matColumnDef="Address">
                <th mat-header-cell *matHeaderCellDef class="text-center">ที่อยู่</th>
                <td mat-cell *matCellDef="let item; let i = index" class="text-center">
                    {{ item.address }}
                </td>
            </ng-container>
            <ng-container matColumnDef="BirthDate">
                <th mat-header-cell *matHeaderCellDef class="text-center">วันเกิด</th>
                <td mat-cell *matCellDef="let item; let i = index" class="text-center">
                    {{ item.birthDateText }}
                </td>
            </ng-container>
            <ng-container matColumnDef="Age">
                <th mat-header-cell *matHeaderCellDef class="text-center">อายุ</th>
                <td mat-cell *matCellDef="let item; let i = index" class="text-center">
                    {{ item.age }}
                </td>
            </ng-container>
            <ng-container matColumnDef="Action">
                <th mat-header-cell *matHeaderCellDef class="text-center">Action</th>
                <td mat-cell *matCellDef="let item; let i = index" class="text-center">
                    <button matButton="filled" class="btn-primary" (click)="onPersonInfoModal(item)">View</button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </mat-card-content>
</mat-card>
